<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Idea</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--a:#e46f1f;--t:#111;--m:#777;--b:#fafafa}
*{box-sizing:border-box}body{margin:0;font-family:Vazirmatn,sans-serif;background:var(--b);color:var(--t);padding-bottom:70px}
.container{max-width:760px;margin:auto;padding:18px}
header{text-align:center;margin-bottom:18px}
.logo{width:95px}
h1{font-size:1.1rem;margin:.5rem 0}
.en{display:block;color:#888;font-size:.85rem}
.desc{color:var(--m);font-size:.9rem;line-height:1.9;max-width:340px;margin:10px auto 20px}
.card{position:relative;display:block;border-radius:14px;overflow:hidden;margin-bottom:18px;color:#fff;text-decoration:none;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card img{display:block;width:100%;aspect-ratio:2/1;object-fit:cover;transition:.4s}
.card:hover img{transform:scale(1.03)}
.ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),rgba(0,0,0,.18))}
.txt{position:absolute;right:18px;bottom:16px}
.txt h2{margin:0}.txt p{margin:3px 0 0;font-size:.85rem;color:#eee}
footer{text-align:center;color:#999;font-size:.75rem;margin:24px 0}
nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:space-around;align-items:center}
nav a{text-decoration:none;color:#222;font-size:.78rem}
</style></head><body>
<div class="container">
<header>
<img class="logo" src="images/logo.png">
<h1>گروه بازرگانی، طراحی و مهندسی ایده هوشمند<span class="en">Smart Idea | Trading, Design & Engineering Group</span></h1>
<div class="desc">تامین و توزیع کالاهای تخصصی، تجهیزات پزشکی و اجرای پروژه‌های طراحی، بازسازی و مهندسی.</div>
</header>
<a class="card" href="products.html">
<img src="images/products.jpg"><div class="ov"></div>
<div class="txt"><h2>محصولات</h2><p>Products & Supply</p></div>
</a>
<a class="card" href="projects.html">
<img src="images/projects.jpg"><div class="ov"></div>
<div class="txt"><h2>پروژه‌ها</h2><p>Projects & Engineering</p></div>
</a>
<footer>Smart Idea | ©2026</footer>
</div>
<nav><a href="#">خانه</a><a href="products.html">محصولات</a><a href="projects.html">پروژه‌ها</a><a href="about.html">درباره</a><a href="contact.html">تماس</a></nav>
</body></html>
